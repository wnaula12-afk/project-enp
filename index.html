<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project EMP</title>

<style>
body {
  background: #0a0f1a;
  color: #00eaff;
  font-family: monospace;
  padding: 15px;
}
h1 { text-align:center; }
.card {
  border: 1px solid #00eaff;
  padding: 10px;
  margin: 10px 0;
}
input, button {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  background: black;
  color: #00eaff;
  border: 1px solid #00eaff;
}
.bar {
  height: 10px;
  background: #00eaff;
  width: 0%;
}
</style>
</head>

<body>

<h1>⚡ PROJECT EMP</h1>

<div>Level: <span id="level">1</span></div>
<div class="bar" id="bar"></div>
<div>XP: <span id="xp">0</span>/100</div>

<!-- SLEEP -->
<div class="card">
<h3>😴 Sleep</h3>
<input type="time" id="sleepStart">
<input type="time" id="sleepEnd">
<button onclick="logSleep()">Log Sleep</button>
<div id="sleepResult"></div>
</div>

<!-- NUTRITION -->
<div class="card">
<h3>🍽️ Nutrition</h3>
<input placeholder="Meal" id="meal">
<input type="number" placeholder="Calories" id="calories">
<button onclick="function addMeal(){
  const nameInput = document.getElementById("meal");
  const calInput = document.getElementById("calories");

  const name = nameInput.value.trim();
  const cal = Number(calInput.value);

  if(name === "" || isNaN(cal) || cal <= 0){
    alert("Enter a valid meal and calories");
    return;
  }

  // Ensure meals array exists
  if(!data.meals){
    data.meals = [];
  }

  data.meals.push({ name: name, cal: cal });

  // Clear inputs
  nameInput.value = "";
  calInput.value = "";

  save();
  updateUI();
}

<!-- TRAIN -->
<div class="card">
<h3>🏋️ Training</h3>
<button onclick="addXP(20)">Workout Done (+20 XP)</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("empData")) || {
  xp:0, level:1, meals:[], history:[]
};

function save(){ localStorage.setItem("empData", JSON.stringify(data)); }

function updateUI(){
  document.getElementById("xp").innerText = data.xp;
  document.getElementById("level").innerText = data.level;
  document.getElementById("bar").style.width = data.xp + "%";

  let total = data.meals.reduce((a,b)=>a+b.cal,0);
  document.getElementById("totalCal").innerText = total;

  document.getElementById("mealList").innerHTML =
    data.meals.map(m=>`${m.name} - ${m.cal} cal`).join("<br>");
}

function addXP(amount){
  data.xp += amount;
  if (navigator.vibrate) navigator.vibrate(50);

  if(data.xp >= 100){
    data.xp = 0;
    data.level++;
  }
  save(); updateUI();
}

function logSleep(){
  let s = document.getElementById("sleepStart").value;
  let e = document.getElementById("sleepEnd").value;

  let start = new Date(`2020-01-01 ${s}`);
  let end = new Date(`2020-01-01 ${e}`);
  if(end < start) end.setDate(end.getDate()+1);

  let hours = ((end-start)/1000/60/60).toFixed(1);

  document.getElementById("sleepResult").innerText =
    `Slept ${hours} hrs`;

  if(hours >= 7) addXP(10);
}

function addMeal(){
  let name = document.getElementById("meal").value;
  let cal = parseInt(document.getElementById("calories").value);

  if(!name || !cal) return;

  data.meals.push({name, cal});
  addXP(5);
  save(); updateUI();
}

function logRun(){
  let miles = parseFloat(document.getElementById("miles").value);
  let minutes = parseFloat(document.getElementById("minutes").value);

  let pace = (minutes/miles).toFixed(2);

  document.getElementById("runResult").innerText =
    `Pace: ${pace} min/mile`;

  addXP(15);
}

function dailyReset(){
  let today = new Date().toDateString();
  if(data.lastDate !== today){
    data.history.push({...data});
    data.meals = [];
    data.lastDate = today;
    save();
  }
}

dailyReset();
updateUI();
</script>

</body>
</html>
